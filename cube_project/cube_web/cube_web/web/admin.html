<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>后台管理 - 分析就绪数据剖分管理系统</title>
  <style>
    :root {
      --primary: #1a5fb4;
      --primary-dark: #0d3a7d;
      --primary-light: #3584e4;
      --gray: #5e5c64;
      --bg: #f3f6fb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: radial-gradient(circle at top right, rgba(53, 132, 228, 0.12), transparent 28%), linear-gradient(180deg, #f7faff 0%, #f3f6fb 100%);
      color: var(--primary-dark);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    .portal-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: linear-gradient(90deg, #1758aa 0%, #1f72d4 45%, #2f91ea 100%);
      color: #fff;
      box-shadow: 0 6px 20px rgba(20, 78, 150, 0.18);
    }
    .portal-header-inner {
      width: min(100%, 1920px);
      margin: 0 auto;
      padding: 0 32px;
      min-height: 72px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 18px;
    }
    .portal-brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .portal-logo {
      width: 48px;
      height: 48px;
      background: rgba(255, 255, 255, 0.14);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(255, 255, 255, 0.24);
    }
    .portal-logo svg {
      width: 28px;
      height: 28px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
    }
    .portal-brand-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .portal-brand-title {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px;
    }
    .portal-brand-subtitle {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.82);
    }
    .portal-nav {
      display: flex;
      align-items: stretch;
      justify-self: center;
    }
    .portal-nav a {
      color: rgba(255, 255, 255, 0.9);
      text-decoration: none;
      padding: 0 24px;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.2s ease;
      min-height: 72px;
      display: flex;
      align-items: center;
    }
    .portal-nav a:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }
    .portal-nav a.active {
      background: rgba(255, 255, 255, 0.16);
      color: #fff;
    }
    .portal-header-side {
      display: flex;
      justify-content: flex-end;
    }
    .user-chip {
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
      min-height: 36px;
      padding: 0 16px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .main-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 72px);
      padding: 60px 20px;
      text-align: center;
    }
    .dev-icon {
      width: 120px;
      height: 120px;
      margin-bottom: 32px;
      color: var(--primary-light);
    }
    .dev-icon svg {
      width: 100%;
      height: 100%;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.2;
    }
    .dev-title {
      font-size: 36px;
      font-weight: 800;
      color: var(--primary-dark);
      margin-bottom: 16px;
    }
    .dev-desc {
      font-size: 16px;
      color: var(--gray);
      max-width: 480px;
      line-height: 1.8;
    }
    .back-link {
      margin-top: 40px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: var(--primary);
      color: #fff;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.2s ease;
    }
    .back-link:hover {
      background: var(--primary-dark);
    }

    /* 开发中弹窗样式 */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .modal-content {
      background: #fff;
      border-radius: 14px;
      padding: 40px;
      text-align: center;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    .modal-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      color: var(--primary-light);
    }
    .modal-icon svg {
      width: 100%;
      height: 100%;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
    }
    .modal-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 12px;
    }
    .modal-desc {
      font-size: 14px;
      color: var(--gray);
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .modal-btn {
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .modal-btn:hover {
      background: var(--primary-dark);
    }
  </style>
</head>
<body>
  <header class="portal-header">
    <div class="portal-header-inner">
      <div class="portal-brand">
        <div class="portal-logo">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M2 12h20"></path>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10"></path>
          </svg>
        </div>
        <div class="portal-brand-text">
          <div class="portal-brand-title">分析就绪数据剖分管理系统</div>
          <div class="portal-brand-subtitle">Analysis-Ready Data Partitioning Management System</div>
        </div>
      </div>
      <nav class="portal-nav">
        <a href="index.html" onclick="showDevelopingAlert(this); return false;">首页</a>
        <a href="#" onclick="showDevelopingAlert(this); return false;">ARD数据载入</a>
        <a href="partition.html" onclick="showDevelopingAlert(this); return false;">分析就绪数据剖分</a>
        <a href="#" onclick="showDevelopingAlert(this); return false;">剖分数据服务</a>
        <a href="#" onclick="showDevelopingAlert(this); return false;">资源调度</a>
        <a href="#" class="active" onclick="showDevelopingAlert(this); return false;">后台管理</a>
        <a href="encoding.html" onclick="showDevelopingAlert(this); return false;">全球离散格网模型与编码</a>
      </nav>
      <div class="portal-header-side">
        <span class="user-chip">系统总览</span>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div class="dev-icon">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </div>
    <h1 class="dev-title">正在开发中</h1>
    <p class="dev-desc">
      后台管理子系统正在紧张开发中，敬请期待。<br>
      该子系统将提供用户管理、权限配置、系统设置与运维日志等功能。
    </p>
    <a href="index.html" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      返回首页
    </a>
  </main>

  <!-- 开发中提示弹窗 -->
  <div id="developingModal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <div class="modal-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h2 class="modal-title">正在开发中</h2>
      <p class="modal-desc">该子系统正在紧张开发中，敬请期待。</p>
      <button class="modal-btn" onclick="closeDevelopingAlert()">确定</button>
    </div>
  </div>

  <script>
    function showDevelopingAlert(el) {
      document.getElementById('developingModal').style.display = 'flex';
    }
    function closeDevelopingAlert() {
      document.getElementById('developingModal').style.display = 'none';
    }
  </script>
</body>
</html>

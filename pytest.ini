[pytest]
testpaths =
    cube_encoder/tests
    cube_split/tests
    cube_web/tests
markers =
    e2e: tests that require external Ray, MinIO, and PostgreSQL services
    real_aoi: tests that require a readable real raster input
    m2_real: requires destructive isolated OpenGauss test database plus real MinIO and Ray; never skipped
    m3_real: actual OpenGauss, MinIO, Ray dataset-quality-publication acceptance; never skipped

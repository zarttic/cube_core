<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cube Encoder Grid Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    :root {
      --bg-a: #f8f7f4;
      --bg-b: #dce7e3;
      --panel: #ffffff;
      --ink: #152520;
      --muted: #5b7369;
      --line: #c5d7d0;
      --ok: #1d7a5b;
      --err: #aa3d2c;
      --geo: #f08a24;
      --mgrs: #187f8e;
      --isea: #e04c3a;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 10%, #ffffff 0%, transparent 35%),
        radial-gradient(circle at 80% 15%, #e9f3ef 0%, transparent 40%),
        linear-gradient(135deg, var(--bg-a), var(--bg-b));
      min-height: 100vh;
    }

    .wrap {
      max-width: 1320px;
      margin: 0 auto;
      padding: 20px 16px 28px;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 10px 24px rgba(21, 37, 32, 0.08);
    }

    .title {
      margin: 0 0 6px;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: 0.02em;
    }

    .sub {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 13px;
    }

    .grid { display: grid; gap: 10px; }
    label { font-size: 12px; color: var(--muted); font-weight: 600; }
    input, select, button, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      font-family: inherit;
      font-size: 14px;
      background: #fff;
      color: var(--ink);
    }

    button {
      cursor: pointer;
      font-weight: 700;
      background: linear-gradient(135deg, #1f8f6a, #176e7b);
      border: none;
      color: #fff;
      transition: transform 120ms ease, filter 120ms ease;
    }
    button:hover { filter: brightness(1.03); transform: translateY(-1px); }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .status {
      margin-top: 12px;
      min-height: 20px;
      font-size: 13px;
      font-weight: 600;
    }
    .ok { color: var(--ok); }
    .err { color: var(--err); }

    .map-wrap {
      display: grid;
      grid-template-rows: 1fr 150px;
      gap: 12px;
      min-height: 82vh;
    }
    #map {
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      min-height: 540px;
    }

    #raw {
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      color: #203b31;
      background: #f6faf8;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      overflow: auto;
      margin: 0;
    }

    @media (max-width: 980px) {
      .wrap { grid-template-columns: 1fr; }
      .map-wrap { min-height: 70vh; }
      #map { min-height: 420px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <h1 class="title">Grid Visualizer</h1>
      <p class="sub">同时演示 Geohash / MGRS / ISEA4H。数据源可切 API 或 SDK。</p>
      <div class="grid">
        <div class="row2">
          <div>
            <label for="source">数据来源</label>
            <select id="source">
              <option value="api">API (/v1/grid/*)</option>
              <option value="sdk">SDK (/v1/demo/sdk/*)</option>
            </select>
          </div>
          <div>
            <label for="op">操作</label>
            <select id="op">
              <option value="locate">locate</option>
              <option value="cover">cover</option>
              <option value="neighbors">neighbors</option>
              <option value="parent">parent</option>
              <option value="children">children</option>
            </select>
          </div>
        </div>

        <div class="row2">
          <div>
            <label for="gridType">格网类型</label>
            <select id="gridType">
              <option value="geohash">geohash</option>
              <option value="mgrs">mgrs</option>
              <option value="isea4h">isea4h</option>
            </select>
          </div>
          <div>
            <label for="level">层级</label>
            <input id="level" type="number" min="1" max="12" value="6" />
          </div>
        </div>

        <div class="row2">
          <div>
            <label for="lon">经度</label>
            <input id="lon" type="number" step="0.000001" value="116.391" />
          </div>
          <div>
            <label for="lat">纬度</label>
            <input id="lat" type="number" step="0.000001" value="39.907" />
          </div>
        </div>

        <div>
          <label for="bbox">BBox（cover 用，格式 `minLon,minLat,maxLon,maxLat`）</label>
          <input id="bbox" type="text" value="116.385,39.903,116.397,39.911" />
        </div>

        <div>
          <label for="code">拓扑 code（neighbors/parent/children 用；留空将先按当前点 locate）</label>
          <input id="code" type="text" value="" />
        </div>

        <div class="row2">
          <div>
            <label for="coverMode">cover_mode</label>
            <select id="coverMode">
              <option value="intersect">intersect</option>
              <option value="contain">contain</option>
              <option value="minimal">minimal</option>
            </select>
          </div>
          <div>
            <label for="boundaryType">boundary_type</label>
            <select id="boundaryType">
              <option value="polygon">polygon</option>
              <option value="bbox">bbox</option>
            </select>
          </div>
        </div>

        <div class="row2">
          <div>
            <label for="k">neighbors k</label>
            <input id="k" type="number" min="1" max="5" value="1" />
          </div>
          <div>
            <label for="targetLevel">children target_level</label>
            <input id="targetLevel" type="number" min="1" max="12" value="7" />
          </div>
        </div>

        <button id="runBtn">运行可视化</button>
      </div>
      <div id="status" class="status"></div>
    </section>

    <section class="map-wrap">
      <div id="map"></div>
      <pre id="raw">等待请求...</pre>
    </section>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    const map = L.map("map", { zoomControl: true }).setView([39.907, 116.391], 11);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap contributors",
    }).addTo(map);

    const raw = document.getElementById("raw");
    const statusEl = document.getElementById("status");
    let layerGroup = L.layerGroup().addTo(map);

    const palette = {
      geohash: "#f08a24",
      mgrs: "#187f8e",
      isea4h: "#e04c3a",
    };

    function setStatus(text, ok) {
      statusEl.className = ok ? "status ok" : "status err";
      statusEl.textContent = text;
    }

    function clearMap() {
      map.removeLayer(layerGroup);
      layerGroup = L.layerGroup().addTo(map);
    }

    function bboxToPolygon(bbox) {
      const [minLon, minLat, maxLon, maxLat] = bbox;
      return {
        type: "Polygon",
        coordinates: [[
          [minLon, minLat], [maxLon, minLat], [maxLon, maxLat], [minLon, maxLat], [minLon, minLat]
        ]],
      };
    }

    function styleByType(gridType) {
      const color = palette[gridType] || "#333";
      return { color, weight: 1.5, fillColor: color, fillOpacity: 0.16 };
    }

    function drawCell(cell, gridType) {
      const style = styleByType(gridType);
      const geo = cell.geometry || bboxToPolygon(cell.bbox);
      L.geoJSON(geo, { style }).bindTooltip(cell.space_code).addTo(layerGroup);
    }

    function drawPoint(lon, lat) {
      L.circleMarker([lat, lon], { radius: 5, color: "#152520", fillOpacity: 1 }).addTo(layerGroup);
    }

    function drawGeometry(geometry, gridType, label) {
      const style = styleByType(gridType);
      L.geoJSON(geometry, { style }).bindTooltip(label || "").addTo(layerGroup);
    }

    function parseBboxInput(value) {
      const items = value.split(",").map((v) => Number(v.trim()));
      if (items.length !== 4 || items.some((n) => Number.isNaN(n))) {
        throw new Error("BBox 输入格式错误，应为 4 个数字");
      }
      return items;
    }

    async function requestJson(url, payload) {
      const resp = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) {
        const msg = data?.error?.message || `HTTP ${resp.status}`;
        throw new Error(msg);
      }
      return data;
    }

    async function run() {
      const source = document.getElementById("source").value;
      const op = document.getElementById("op").value;
      const gridType = document.getElementById("gridType").value;
      const level = Number(document.getElementById("level").value);
      const lon = Number(document.getElementById("lon").value);
      const lat = Number(document.getElementById("lat").value);
      const bboxText = document.getElementById("bbox").value;
      let code = document.getElementById("code").value.trim();
      const coverMode = document.getElementById("coverMode").value;
      const boundaryType = document.getElementById("boundaryType").value;
      const k = Number(document.getElementById("k").value);
      const targetLevel = Number(document.getElementById("targetLevel").value);
      const gridPrefix = source === "api" ? "/v1/grid" : "/v1/demo/sdk";
      const topologyPrefix = source === "api" ? "/v1/topology" : "/v1/demo/sdk/topology";

      clearMap();
      setStatus("请求中...", true);

      try {
        if (op === "locate") {
          const data = await requestJson(`${gridPrefix}/locate`, {
            grid_type: gridType,
            level,
            point: [lon, lat],
          });
          drawPoint(lon, lat);
          drawCell(data.cell, gridType);
          map.fitBounds(layerGroup.getBounds(), { padding: [20, 20] });
          raw.textContent = JSON.stringify(data, null, 2);
          setStatus(`locate 成功：${data.cell.space_code}`, true);
          return;
        }

        const bbox = parseBboxInput(bboxText);
        if (op === "cover") {
          const data = await requestJson(`${gridPrefix}/cover`, {
            grid_type: gridType,
            level,
            cover_mode: coverMode,
            boundary_type: boundaryType,
            bbox,
            crs: "EPSG:4326",
          });
          for (const cell of data.cells) {
            drawCell(cell, gridType);
          }
          if (data.cells.length > 0) {
            map.fitBounds(layerGroup.getBounds(), { padding: [20, 20] });
          }
          raw.textContent = JSON.stringify(data, null, 2);
          setStatus(`cover 成功：${data.statistics.cell_count} 个网格`, true);
          return;
        }

        if (!code) {
          const located = await requestJson(`${gridPrefix}/locate`, {
            grid_type: gridType,
            level,
            point: [lon, lat],
          });
          code = located.cell.space_code;
          document.getElementById("code").value = code;
        }

        if (op === "parent") {
          const data = await requestJson(`${topologyPrefix}/parent`, { grid_type: gridType, code });
          const parentGeo = await requestJson(`${topologyPrefix}/geometry`, {
            grid_type: gridType,
            code: data.parent_code,
            boundary_type: "polygon",
          });
          drawGeometry(parentGeo.geometry, gridType, data.parent_code);
          map.fitBounds(layerGroup.getBounds(), { padding: [20, 20] });
          raw.textContent = JSON.stringify({ ...data, geometry: parentGeo.geometry }, null, 2);
          setStatus(`parent 成功：${data.parent_code}`, true);
          return;
        }

        if (op === "neighbors") {
          const data = await requestJson(`${topologyPrefix}/neighbors`, { grid_type: gridType, code, k });
          const codes = data.result_codes.slice(0, 200);
          for (const c of codes) {
            const geo = await requestJson(`${topologyPrefix}/geometry`, {
              grid_type: gridType,
              code: c,
              boundary_type: "polygon",
            });
            drawGeometry(geo.geometry, gridType, c);
          }
          if (codes.length > 0) {
            map.fitBounds(layerGroup.getBounds(), { padding: [20, 20] });
          }
          raw.textContent = JSON.stringify(data, null, 2);
          setStatus(`neighbors 成功：${data.statistics.count} 个编码`, true);
          return;
        }

        const data = await requestJson(`${topologyPrefix}/children`, {
          grid_type: gridType,
          code,
          target_level: targetLevel,
        });
        const childCodes = data.child_codes.slice(0, 200);
        for (const c of childCodes) {
          const geo = await requestJson(`${topologyPrefix}/geometry`, {
            grid_type: gridType,
            code: c,
            boundary_type: "polygon",
          });
          drawGeometry(geo.geometry, gridType, c);
        }
        if (childCodes.length > 0) {
          map.fitBounds(layerGroup.getBounds(), { padding: [20, 20] });
        }
        raw.textContent = JSON.stringify(data, null, 2);
        setStatus(`children 成功：${data.statistics.count} 个编码（可视化前 200）`, true);
      } catch (err) {
        raw.textContent = String(err);
        setStatus(`失败：${err.message || err}`, false);
      }
    }

    document.getElementById("runBtn").addEventListener("click", run);
    run();
  </script>
</body>
</html>

name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q tests

  perf-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run performance smoke check
        env:
          PERF_MAX_GEOHASH_LOCATE_MS: "4.0"
          PERF_MAX_MGRS_LOCATE_MS: "15.0"
          PERF_MAX_H3_LOCATE_MS: "4.0"
          PERF_MAX_GEOHASH_COVER_MS: "120.0"
          PERF_MAX_MGRS_COVER_MS: "260.0"
          PERF_MAX_H3_COVER_MS: "180.0"
          PERF_MAX_BATCH_GEOMETRY_MS: "70.0"
          PERF_MAX_MGRS_NEIGHBORS_MS: "30.0"
          PERF_MAX_H3_NEIGHBORS_MS: "6.0"
        run: python -m grid_core.app.perf_smoke

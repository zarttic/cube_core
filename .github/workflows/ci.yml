name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: cube_web/frontend/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice-writer poppler-utils

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "cube_encoder[dev]"
          python -m pip install -e "cube_split[dev]"
          python -m pip install -e "cube_web[dev]"
          cd cube_web/frontend
          npm ci

      - name: Lint and type check
        run: |
          python -m ruff check cube_encoder cube_split cube_web
          python -m mypy cube_encoder/grid_core cube_split/cube_split cube_web/cube_web

      - name: Run tests
        run: |
          PYTHONPATH=cube_encoder:cube_split:cube_web python -m pytest -q cube_encoder/tests cube_split/tests
          cd cube_web
          PYTHONPATH=../cube_encoder:../cube_split:. python -m pytest -q tests

      - name: App start smoke
        run: |
          cd cube_web
          PYTHONPATH=../cube_encoder:../cube_split:. python -m uvicorn cube_web.app:app --host 127.0.0.1 --port 50040 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:50040/health; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:50040/health
          curl -fsS http://127.0.0.1:50040/

      - name: Build frontend
        run: |
          cd cube_web/frontend
          npm run build

  perf-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "cube_encoder[dev]"

      - name: Load perf thresholds
        run: cat .github/perf-thresholds.env >> "$GITHUB_ENV"

      - name: Run performance smoke check
        run: |
          cd cube_encoder
          PERF_SMOKE_JSON_PATH=artifacts/perf-smoke.json python -m grid_core.app.perf_smoke

      - name: Upload perf smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: perf-smoke-report
          path: cube_encoder/artifacts/perf-smoke.json
          if-no-files-found: error

  sdk-package-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build SDK package artifacts
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          cd cube_encoder
          python -m build

      - name: Wheel install smoke test
        run: |
          python -m pip install --force-reinstall cube_encoder/dist/*.whl
          python -c "from grid_core.sdk import CubeEncoderSDK; c=CubeEncoderSDK().locate('geohash',7,[116.391,39.907]); assert c.space_code"

      - name: SDist install smoke test
        run: |
          python -m pip install --force-reinstall cube_encoder/dist/*.tar.gz
          python -c "from grid_core.sdk import CubeEncoderSDK; c=CubeEncoderSDK().locate('mgrs',3,[116.391,39.907]); assert c.space_code"
